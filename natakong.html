<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NataKong</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;
overflow-x:hidden;
background:black;
}

/* ===== FONDO ===== */

.background{
position:fixed;
inset:0;
background:url("Imagenes/nata_kong.jpg") center/cover no-repeat;
filter:blur(60px) brightness(.4) saturate(120%);
transform:scale(1.3);
z-index:-3;
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to bottom,
rgba(0,0,0,.2),
rgba(0,0,0,.7),
rgba(0,0,0,.95));
z-index:-2;
}

/* ===== CONTENEDOR ===== */

.album-page{
display:flex;
flex-direction:column;
align-items:center;
padding-top:120px;
animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}

/* ===== PORTADA ===== */

.album-cover{
width:340px;
border-radius:15px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
transition:.6s;
}

.disc{
border-radius:50%;
box-shadow:
0 0 50px rgba(0,0,0,0.9),
inset 0 0 20px rgba(0,0,0,0.6);
}

.spin{
animation:spinDisc 6s linear infinite;
}

@keyframes spinDisc{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.album-title{
margin-top:25px;
font-size:2rem;
font-weight:700;
}

/* ===== LISTA ===== */

.song-list{
margin-top:40px;
width:90%;
max-width:500px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:10px;
padding:15px;
}

.song{
display:flex;
align-items:center;
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:.3s;
}

.song:last-child{
border-bottom:none;
}

.song:hover{
background:rgba(255,255,255,0.08);
}

.song img{

.player{

}

.progress{

}

.controls{

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="album-page">

<img src="Imagenes/nata_kong.jpg" class="album-cover" id="cover">

<div class="album-title">NataKong</div>

<div class="song-list">

<div class="song" onclick="playSong(0)">
<img src="Imagenes/nata_kong.jpg">
<span>1. NataKong</span>
</div>

<div class="song" onclick="playSong(1)">
<img src="Imagenes/nata_kong.jpg">
<span>2. Ch y la Pizza</span>
</div>

<div class="song" onclick="playSong(2)">
<img src="Imagenes/nata_kong.jpg">
<span>3. Morritas</span>
</div>

<div class="song" onclick="playSong(3)">
<img src="Imagenes/nata_kong.jpg">
<span>4. El de la Codeína</span>
</div>

<div class="song" onclick="playSong(4)">
<img src="Imagenes/nata_kong.jpg">
<span>5. Mi Bello Ángel</span>
</div>

</div>

<a href="index.html" class="btn btn-light back-btn">⬅ Volver</a>

</div>

<!-- PLAYER -->

<div class="player">

<div id="songName">Selecciona una canción</div>

<div class="progress-container">
<input type="range" class="progress" id="progress" value="0">
</div>

<div class="controls">

<button onclick="prevSong()">⏮</button>

<button onclick="togglePlay()">▶ / ⏸</button>

<button onclick="nextSong()">⏭</button>

</div>

</div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const progress = document.getElementById("progress");
const songName = document.getElementById("songName");

const songs = [
"Audio/natakong.mp3",
"Audio/ch_y_la_pizza.mp3",
"Audio/morritas.mp3",
"Audio/el_de_la_codeina.mp3",
"Audio/mi_bello_angel.mp3"
];

let currentSong = 0;

function playSong(index){

currentSong = index;

audio.src = songs[index];
audio.play();

songName.innerText = songs[index].split("/")[1];

cover.classList.add("disc");
cover.classList.add("spin");

}

function togglePlay(){

if(audio.paused){
audio.play();
cover.classList.add("disc");
cover.classList.add("spin");
}else{
audio.pause();
cover.classList.remove("spin");
}

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){
currentSong = 0;
}

playSong(currentSong);

}

function prevSong(){

currentSong--;

if(currentSong < 0){
currentSong = songs.length -1;
}

playSong(currentSong);

}

audio.addEventListener("timeupdate", () => {

progress.value = (audio.currentTime / audio.duration) * 100;

});

progress.addEventListener("input", () => {

audio.currentTime = (progress.value / 100) * audio.duration;

});

audio.addEventListener("ended", () => {

nextSong();

});

</script>

</body>
</html>
