<style>

body{

<img src="Imagenes/Corridos_tumbados.jfif">

</div>

<div class="song" onclick="playSong(3)">
<img src="Imagenes/Corridos_tumbados.jfif">
<span>4. El Cazador</span>
</div>

<div class="song" onclick="playSong(4)">
<img src="Imagenes/Corridos_tumbados.jfif">
<span>5. Iniciales AL</span>
</div>

</div>

<!-- PLATAFORMAS -->

<div class="platforms">

<h5>Escuchar en plataformas</h5>

<a href="https://open.spotify.com/album/5U6Ypq8XnZ3ZxYhC1vGzJm" target="_blank" class="platform spotify">
<i class="fab fa-spotify"></i>
</a>

<a href="https://music.youtube.com/" target="_blank" class="platform youtube">
<i class="fab fa-youtube"></i>
</a>

<a href="https://music.apple.com/" target="_blank" class="platform apple">
<i class="fab fa-apple"></i>
</a>

</div>

<a href="index.html" class="btn btn-light back-btn">⬅ Volver</a>

<!-- PLAYER -->

<div class="player">

<div id="songName">Selecciona una canción</div>

<div class="progress-container">
<input type="range" class="progress" id="progress" value="0">
</div>

<div class="controls">

<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">▶ / ⏸</button>
<button onclick="nextSong()">⏭</button>

</div>

</div>

<audio id="audio"></audio>

<script>

const audio=document.getElementById("audio");
const cover=document.getElementById("cover");
const progress=document.getElementById("progress");
const songName=document.getElementById("songName");

const songs=[
"Audio/amor_tumbado.mp3",
"Audio/el_drip.mp3",
"Audio/soy_el_diablo.mp3",
"Audio/el_f.mp3",
"Audio/pacas_verdes.mp3"
];

let currentSong=0;

function playSong(index){

currentSong=index;
audio.src=songs[index];
audio.play();

songName.innerText=songs[index].split("/")[1];

cover.classList.add("disc");
cover.classList.add("spin");

}

function togglePlay(){

if(audio.paused){
audio.play();
cover.classList.add("disc");
cover.classList.add("spin");
}else{
audio.pause();
cover.classList.remove("spin");
}

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

playSong(currentSong);

}

function prevSong(){

currentSong--;

if(currentSong<0){
currentSong=songs.length-1;
}

playSong(currentSong);

}

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100;

});

progress.addEventListener("input",()=>{

audio.currentTime=(progress.value/100)*audio.duration;

});

audio.addEventListener("ended",()=>{

nextSong();

});

</script>

</body>
</html>
